<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Studio</title>
<!-- Libs -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css" id="mdCss">
<style>
/* ══════════════════════════════════════
   CSS Variables — Theme System
   ══════════════════════════════════════ */
:root {
  --transition: .25s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg-primary:   #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary:  #1c2128;
  --bg-card:      #1c2128;
  --bg-hover:     #21262d;
  --bg-input:     #0d1117;
  --border:       #30363d;
  --border-light: #21262d;
  --text-primary: #e6edf3;
  --text-secondary:#8b949e;
  --text-muted:   #484f58;
  --accent:       #58a6ff;
  --accent-hover: #79c0ff;
  --accent-bg:    rgba(56,139,253,.15);
  --green:        #3fb950;
  --green-bg:     rgba(46,160,67,.15);
  --red:          #f85149;
  --red-bg:       rgba(248,81,73,.15);
  --yellow:       #d29922;
  --glow:         0 0 20px rgba(88,166,255,.08);
  --shadow:       0 2px 8px rgba(0,0,0,.3);
}
[data-theme="light"] {
  --bg-primary:   #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-tertiary:  #f0f2f5;
  --bg-card:      #ffffff;
  --bg-hover:     #eaeef2;
  --bg-input:     #ffffff;
  --border:       #d0d7de;
  --border-light: #e8ebef;
  --text-primary: #1f2328;
  --text-secondary:#656d76;
  --text-muted:   #8b949e;
  --accent:       #0969da;
  --accent-hover: #0550ae;
  --accent-bg:    rgba(9,105,218,.08);
  --green:        #1a7f37;
  --green-bg:     rgba(26,127,55,.1);
  --red:          #cf222e;
  --red-bg:       rgba(207,34,46,.1);
  --yellow:       #9a6700;
  --glow:         0 0 20px rgba(9,105,218,.05);
  --shadow:       0 1px 4px rgba(0,0,0,.08);
}

/* ══════════════════════════════════════
   Base Reset
   ══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background var(--transition), color var(--transition);
  overflow: hidden;
}

/* ══════════════════════════════════════
   Toolbar
   ══════════════════════════════════════ */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  z-index: 50;
}
.toolbar .brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 8px;
}
.toolbar .brand .logo {
  width: 26px; height: 26px;
  background: linear-gradient(135deg, var(--accent), #a371f7);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 14px;
}
.toolbar .brand span { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.toolbar .filename {
  font-size: 12px; color: var(--text-secondary);
  background: var(--bg-tertiary); padding: 3px 10px; border-radius: 10px;
  max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.toolbar .spacer { flex: 1; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-tertiary); color: var(--text-primary);
  cursor: pointer; transition: all .15s; white-space: nowrap;
  font-family: inherit;
}
.btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { color: var(--red); }
.btn.danger:hover { background: var(--red-bg); }
.btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
.btn.icon-only { padding: 6px 8px; }

/* Mode Tabs */
.mode-tabs {
  display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.mode-tab {
  padding: 5px 12px; font-size: 12px; font-weight: 500;
  cursor: pointer; background: var(--bg-tertiary); border: none;
  border-right: 1px solid var(--border); color: var(--text-secondary);
  transition: all .15s; font-family: inherit;
}
.mode-tab:last-child { border-right: none; }
.mode-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
.mode-tab.active { background: var(--accent); color: #fff; }

/* Theme Toggle */
.theme-toggle {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-tertiary); cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
  transition: all .15s;
}
.theme-toggle:hover { background: var(--bg-hover); }

/* ══════════════════════════════════════
   Format Bar
   ══════════════════════════════════════ */
.format-bar {
  display: flex; align-items: center; gap: 1px;
  padding: 4px 20px; background: var(--bg-secondary);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.format-bar.hidden { display: none; }
.fmt-btn {
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; border-radius: 4px;
  cursor: pointer; color: var(--text-secondary); font-size: 13px; font-weight: 600;
  transition: all .12s; font-family: inherit;
}
.fmt-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.fmt-sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }

/* ══════════════════════════════════════
   Main Area
   ══════════════════════════════════════ */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* Drop overlay */
.drop-overlay {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,.6); z-index: 100; pointer-events: none;
}
.drop-overlay.active { display: flex; }
.drop-overlay-inner {
  padding: 40px 60px; background: var(--bg-card); border-radius: 12px;
  border: 2px dashed var(--accent); text-align: center;
  font-size: 18px; font-weight: 600; color: var(--accent);
}

/* Upload Splash */
.upload-splash { flex:1; display:flex; align-items:center; justify-content:center; }
.upload-splash.hidden { display:none; }
.upload-card {
  text-align: center; padding: 50px 60px;
  border: 1px solid var(--border); border-radius: 16px;
  background: var(--bg-card); cursor: pointer;
  transition: all .25s; max-width: 460px;
  box-shadow: var(--glow);
}
.upload-card:hover { border-color: var(--accent); box-shadow: 0 0 30px rgba(88,166,255,.12); }
.upload-icon {
  width: 56px; height: 56px; margin: 0 auto 20px;
  background: var(--accent-bg); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}
.upload-card h2 { font-size: 18px; margin-bottom: 8px; }
.upload-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* ══════════════════════════════════════
   Editor Panels
   ══════════════════════════════════════ */
.editor-wrap { flex:1; display:none; overflow:hidden; }
.editor-wrap.active { display:flex; }

.rendered-panel {
  flex: 1; overflow-y: auto; padding: 32px 40px;
  background: var(--bg-primary); outline: none;
}
.rendered-panel.hidden { display:none; }

.source-panel { flex:1; display:none; overflow:hidden; }
.source-panel.active { display:flex; }
.source-panel textarea {
  flex:1; padding: 24px 32px;
  font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
  font-size: 13px; line-height: 1.7;
  border: none; outline: none; resize: none;
  background: var(--bg-primary); color: var(--text-primary);
  tab-size: 2;
}

.split-divider {
  width: 3px; background: var(--border); cursor: col-resize;
  display: none; flex-shrink: 0; transition: background .15s;
}
.split-divider:hover { background: var(--accent); }

/* markdown body overrides */
.markdown-body { max-width: 900px; margin: 0 auto; background: transparent !important; }
.markdown-body img { max-width: 100%; }

/* Mermaid container */
.mermaid-container { margin: 16px 0; display: flex; justify-content: center; }
.mermaid-container svg { max-width: 100%; }

/* Mermaid error fallback */
.mermaid-error {
  margin: 16px 0; padding: 12px 16px;
  background: var(--red-bg); border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
  border-radius: 8px; font-size: 12px; color: var(--red);
}
.mermaid-error summary { cursor: pointer; font-weight: 600; }
.mermaid-error pre { margin-top: 8px; white-space: pre-wrap; font-size: 11px; color: var(--text-secondary); }



/* ══════════════════════════════════════
   Version Panel (Side drawer)
   ══════════════════════════════════════ */
.version-panel {
  width: 0; overflow: hidden; flex-shrink: 0;
  background: var(--bg-secondary); border-left: 1px solid var(--border);
  transition: width var(--transition);
  display: flex; flex-direction: column;
}
.version-panel.open { width: 320px; }
.vp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 600;
}
.vp-header button { background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:18px; }
.vp-header button:hover { color:var(--text-primary); }
.vp-body { flex:1; overflow-y:auto; padding: 8px; }
.vp-empty { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px; }

.ver-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  border: 1px solid transparent; transition: all .15s; margin-bottom: 4px;
}
.ver-item:hover { background: var(--bg-hover); border-color: var(--border); }
.ver-item.active { border-color: var(--accent); background: var(--accent-bg); }
.ver-item .ver-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
.ver-item .ver-time { font-size: 11px; color: var(--text-muted); }
.ver-item .ver-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 10px;
  background: var(--accent-bg); color: var(--accent); font-weight: 500;
}
.ver-item .ver-btns {
  display: flex; gap: 4px; margin-top: 6px;
}
.ver-action-btn {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg-tertiary);
  color: var(--text-secondary); cursor: pointer; font-family: inherit;
  transition: all .12s;
}
.ver-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-muted); }
.ver-action-btn.del { color: var(--red); }
.ver-action-btn.del:hover { background: var(--red-bg); }
.ver-actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }

/* ══════════════════════════════════════
   Diff View (Overlay)
   ══════════════════════════════════════ */
.diff-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 200; display: none; align-items: center; justify-content: center;
}
.diff-overlay.active { display: flex; }
.diff-modal {
  width: 90vw; max-width: 1000px; max-height: 85vh;
  background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);
  display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,.4);
}
.diff-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.diff-header h3 { font-size: 15px; font-weight: 600; }
.diff-header .close-btn {
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; font-size: 20px; width: 32px; height: 32px;
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
}
.diff-header .close-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.diff-body {
  flex: 1; overflow: auto; padding: 0;
  font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
  font-size: 13px; line-height: 1.7;
}
.diff-line { display: flex; padding: 0 16px; min-height: 24px; }
.diff-line .line-no {
  width: 40px; flex-shrink: 0; text-align: right; padding-right: 12px;
  color: var(--text-muted); user-select: none; font-size: 12px;
}
.diff-line .line-content { flex: 1; white-space: pre-wrap; word-break: break-all; padding: 0 4px; }
.diff-line.added { background: var(--green-bg); }
.diff-line.added .line-content { color: var(--green); }
.diff-line.removed { background: var(--red-bg); }
.diff-line.removed .line-content { color: var(--red); }
.diff-line.context { }
.diff-line .prefix { user-select: none; display: inline-block; width: 16px; color: var(--text-muted); }
.diff-stats { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); display: flex; gap: 16px; }
.diff-stats .stat-add { color: var(--green); }
.diff-stats .stat-del { color: var(--red); }
.diff-selector { display:flex; gap:8px; padding:12px 20px; border-bottom:1px solid var(--border); align-items:center; flex-wrap:wrap; }
.diff-selector label { font-size:12px; color:var(--text-secondary); }
.diff-selector select {
  padding:4px 8px; border-radius:6px; border:1px solid var(--border);
  background:var(--bg-input); color:var(--text-primary); font-size:12px; font-family:inherit;
}

/* ══════════════════════════════════════
   Toast
   ══════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 8px; font-size: 13px;
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border);
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; }

/* ══════════════════════════════════════
   Scrollbar
   ══════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ══════════════════════════════════════
   Responsive
   ══════════════════════════════════════ */
@media (max-width: 768px) {
  .version-panel.open { width: 260px; }
  .rendered-panel { padding: 16px; }
  .toolbar { padding: 8px 12px; gap: 6px; }
  .diff-modal { width: 96vw; }
}
</style>
</head>
<body>

<!-- ══ Toolbar ══ -->
<div class="toolbar">
  <div class="brand">
    <div class="logo">M</div>
    <span>MD Studio</span>
  </div>
  <span class="filename" id="filename"></span>
  <span class="spacer"></span>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="wysiwyg">Visual</button>
    <button class="mode-tab" data-mode="source">Source</button>
    <button class="mode-tab" data-mode="split">Split</button>
  </div>

  <label class="btn">
    <svg viewBox="0 0 16 16"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14ZM11.78 4.72a.749.749 0 1 1-1.06 1.06L8.75 3.81V9.5a.75.75 0 0 1-1.5 0V3.81L5.28 5.78a.749.749 0 1 1-1.06-1.06l3.25-3.25a.749.749 0 0 1 1.06 0l3.25 3.25Z"/></svg>
    Upload
    <input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden>
  </label>

  <button class="btn primary" id="downloadBtn" style="display:none">
    <svg viewBox="0 0 16 16"><path d="M7.47 10.78a.749.749 0 0 0 1.06 0l3.25-3.25a.749.749 0 1 0-1.06-1.06L8.75 8.44V1.75a.75.75 0 0 0-1.5 0v6.69L5.28 6.47a.749.749 0 1 0-1.06 1.06ZM2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/></svg>
    Download
  </button>

  <button class="btn" id="saveVerBtn" style="display:none" title="Save Version">
    <svg viewBox="0 0 16 16"><path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"/></svg>
    Save Version
  </button>

  <button class="btn" id="versionBtn" style="display:none" title="Version History">
    <svg viewBox="0 0 16 16"><path d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.25a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/></svg>
    Versions <span id="verCount" style="font-size:10px;opacity:.7"></span>
  </button>

  <button class="theme-toggle" id="themeBtn" title="Toggle Theme">🌙</button>
</div>

<!-- ══ Format Bar ══ -->
<div class="format-bar" id="formatBar">
  <button class="fmt-btn" onclick="fmt('bold')" title="Bold Ctrl+B"><b>B</b></button>
  <button class="fmt-btn" onclick="fmt('italic')" title="Italic Ctrl+I"><i>I</i></button>
  <button class="fmt-btn" onclick="fmt('strikeThrough')" title="Strikethrough"><s>S</s></button>
  <button class="fmt-btn" onclick="fmt('code')" title="Inline Code" style="font-family:monospace;font-size:12px">&lt;/&gt;</button>
  <span class="fmt-sep"></span>
  <button class="fmt-btn" onclick="fmtBlock('h1')" title="Heading 1" style="font-size:15px">H1</button>
  <button class="fmt-btn" onclick="fmtBlock('h2')" title="Heading 2" style="font-size:13px">H2</button>
  <button class="fmt-btn" onclick="fmtBlock('h3')" title="Heading 3" style="font-size:11px">H3</button>
  <span class="fmt-sep"></span>
  <button class="fmt-btn" onclick="fmt('insertUnorderedList')" title="Bullet List">•</button>
  <button class="fmt-btn" onclick="fmt('insertOrderedList')" title="Numbered List">1.</button>
  <span class="fmt-sep"></span>
  <button class="fmt-btn" onclick="fmtBlock('blockquote')" title="Quote" style="font-size:16px">"</button>
  <button class="fmt-btn" onclick="insertCodeBlock()" title="Code Block" style="font-family:monospace;font-size:11px">{ }</button>
  <span class="fmt-sep"></span>
  <button class="fmt-btn" onclick="fmt('undo')" title="Undo Ctrl+Z">↩</button>
  <button class="fmt-btn" onclick="fmt('redo')" title="Redo">↪</button>
</div>

<!-- ══ Main ══ -->
<div class="main" id="mainArea">
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-overlay-inner">📄 Drop to load Markdown file</div>
  </div>

  <!-- Splash -->
  <div class="upload-splash" id="splash">
    <div class="upload-card" id="uploadCard">
      <div class="upload-icon">📄</div>
      <h2>Open Markdown File</h2>
      <p>Click to select a file, or drag & drop a .md file here<br>Supports Mermaid diagram rendering</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
        <button class="btn primary" onclick="startEmpty(event)">Start Blank</button>
        <button class="btn" onclick="startDemo(event)">Load Demo</button>
      </div>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap" id="editorWrap">
    <div class="rendered-panel markdown-body" id="rendered" contenteditable="true" spellcheck="false"></div>
    <div class="split-divider" id="splitDivider"></div>
    <div class="source-panel" id="sourcePanel">
      <textarea id="sourceTA" spellcheck="false" placeholder="Write Markdown here ..."></textarea>
    </div>
  </div>

  <!-- Version Panel -->
  <div class="version-panel" id="versionPanel">
    <div class="vp-header">
      <span>📋 Version History</span>
      <button onclick="toggleVersionPanel()">✕</button>
    </div>
    <div class="vp-body" id="versionList"></div>
    <div class="ver-actions" id="verActions">
      <button class="btn" onclick="diffSelected()" id="diffBtn" disabled style="flex:1">
        <svg viewBox="0 0 16 16" style="width:12px;height:12px"><path d="M8 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/></svg>
        Compare Selected
      </button>
    </div>
  </div>
</div>

<!-- ══ Diff Overlay ══ -->
<div class="diff-overlay" id="diffOverlay">
  <div class="diff-modal">
    <div class="diff-header">
      <h3 id="diffTitle">Version Diff</h3>
      <button class="close-btn" onclick="closeDiff()">✕</button>
    </div>
    <div class="diff-selector" id="diffSelector">
      <label>Base:</label><select id="diffFrom"></select>
      <label>Compare:</label><select id="diffTo"></select>
      <button class="btn" onclick="runDiffFromSelectors()" style="padding:4px 10px;font-size:11px">Compare</button>
    </div>
    <div class="diff-stats" id="diffStats"></div>
    <div class="diff-body" id="diffBody"></div>
  </div>
</div>

<!-- ══ Toast ══ -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   State
   ══════════════════════════════════════ */
let currentMode = 'wysiwyg';
let rawMd = '';
let currentFileName = 'untitled.md';
let ignoreSync = false;
let versions = [];          // [{label, md, ts}]
let selectedVersions = [];  // indices

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const fileInput   = $('#fileInput');
const filenameEl  = $('#filename');
const downloadBtn = $('#downloadBtn');
const saveVerBtn  = $('#saveVerBtn');
const versionBtn  = $('#versionBtn');
const formatBar   = $('#formatBar');
const splash      = $('#splash');
const editorWrap  = $('#editorWrap');
const rendered    = $('#rendered');
const sourcePanel = $('#sourcePanel');
const sourceTA    = $('#sourceTA');
const splitDiv    = $('#splitDivider');
const dropOverlay = $('#dropOverlay');
const versionPanel= $('#versionPanel');
const versionList = $('#versionList');
const diffOverlay = $('#diffOverlay');
const themeBtn    = $('#themeBtn');

/* ══════════════════════════════════════
   Theme
   ══════════════════════════════════════ */
function getTheme() { return document.documentElement.getAttribute('data-theme'); }
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  const cssHref = t === 'dark'
    ? 'https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css'
    : 'https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.css';
  $('#mdCss').href = cssHref;
  localStorage.setItem('md-studio-theme', t);
  // Re-init mermaid with theme
  initMermaid();
}
themeBtn.addEventListener('click', () => setTheme(getTheme() === 'dark' ? 'light' : 'dark'));

// Restore theme
const savedTheme = localStorage.getItem('md-studio-theme');
if (savedTheme) setTheme(savedTheme);

/* ══════════════════════════════════════
   Mermaid
   ══════════════════════════════════════ */
function initMermaid() {
  mermaid.initialize({
    startOnLoad: false,
    theme: getTheme() === 'dark' ? 'dark' : 'default',
    securityLevel: 'loose',
  });
}
initMermaid();

let mermaidId = 0;
async function renderMermaidBlocks(container) {
  const pres = container.querySelectorAll('pre code.language-mermaid');
  for (const code of pres) {
    const pre = code.parentElement;
    const graphDef = code.textContent.trim();
    if (!graphDef) continue;
    const id = 'mmd-' + (++mermaidId);
    try {
      // Validate first
      if (await mermaid.parse(graphDef)) {
        const { svg } = await mermaid.render(id, graphDef);
        const div = document.createElement('div');
        div.className = 'mermaid-container';
        div.innerHTML = svg;
        div.setAttribute('data-mermaid-src', graphDef);
        pre.replaceWith(div);
      }
    } catch (e) {
      console.warn('Mermaid render error:', e);
      // Show friendly error fallback, keep original code block visible
      const errDiv = document.createElement('div');
      errDiv.className = 'mermaid-error';
      errDiv.innerHTML = `<details><summary>⚠️ Mermaid syntax error (click to expand)</summary><pre>${escHtml(e.message || String(e))}</pre></details>`;
      pre.parentElement.insertBefore(errDiv, pre.nextSibling);
      // Clean up any orphaned error SVGs mermaid may have injected
      const errSvg = document.getElementById('d' + id);
      if (errSvg) errSvg.remove();
    }
  }
  // Clean up any mermaid error containers injected into body
  document.querySelectorAll('#d-mermaid,.mermaid-error-svg,[id^="dmmd-"]').forEach(el => el.remove());
}

/* ══════════════════════════════════════
   Marked config
   ══════════════════════════════════════ */
marked.setOptions({ breaks: true, gfm: true });

/* ══════════════════════════════════════
   Turndown config
   ══════════════════════════════════════ */
const td = new TurndownService({
  headingStyle: 'atx', codeBlockStyle: 'fenced',
  bulletListMarker: '-', emDelimiter: '*', strongDelimiter: '**', hr: '---',
});
td.use(turndownPluginGfm.gfm);

td.addRule('fencedCodeBlock', {
  filter: (node) => node.nodeName === 'PRE' && node.querySelector('code'),
  replacement: (content, node) => {
    const code = node.querySelector('code');
    const lang = (code.className.match(/language-(\S+)/) || ['',''])[1];
    return '\n\n```' + lang + '\n' + code.textContent + '\n```\n\n';
  }
});
td.addRule('mermaidContainer', {
  filter: (node) => node.classList && node.classList.contains('mermaid-container'),
  replacement: (content, node) => {
    const src = node.getAttribute('data-mermaid-src') || '';
    return '\n\n```mermaid\n' + src + '\n```\n\n';
  }
});

/* ══════════════════════════════════════
   Render Helpers
   ══════════════════════════════════════ */
function renderToHtml(md) { return marked.parse(md); }
function htmlToMd() { return td.turndown(rendered.innerHTML); }

async function loadMd(md, fname) {
  rawMd = md;
  currentFileName = fname || 'untitled.md';
  filenameEl.textContent = currentFileName;
  downloadBtn.style.display = '';
  saveVerBtn.style.display = '';
  versionBtn.style.display = '';

  rendered.innerHTML = renderToHtml(rawMd);
  await renderMermaidBlocks(rendered);
  sourceTA.value = rawMd;

  splash.classList.add('hidden');
  editorWrap.classList.add('active');
  applyMode();
}

/* ══════════════════════════════════════
   Mode Switching
   ══════════════════════════════════════ */
function applyMode() {
  $$('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === currentMode));
  const isSrc = currentMode === 'source';
  const isSplit = currentMode === 'split';
  rendered.classList.toggle('hidden', isSrc);
  rendered.contentEditable = !isSrc;
  sourcePanel.classList.toggle('active', isSrc || isSplit);
  splitDiv.style.display = isSplit ? '' : 'none';
  formatBar.classList.toggle('hidden', isSrc);
}

$$('.mode-tab').forEach(tab => {
  tab.addEventListener('click', async () => {
    if (currentMode === 'source' || currentMode === 'split') {
      rawMd = sourceTA.value;
      rendered.innerHTML = renderToHtml(rawMd);
      await renderMermaidBlocks(rendered);
    } else {
      rawMd = htmlToMd();
      sourceTA.value = rawMd;
    }
    currentMode = tab.dataset.mode;
    applyMode();
  });
});

/* ══════════════════════════════════════
   Sync (split mode) — content + scroll
   ══════════════════════════════════════ */
let syncTimer = null;

// Track which panel the user is actively interacting with
// Only that panel drives scroll sync → prevents infinite loop & flashing
let activePanel = null;
rendered.addEventListener('mouseenter', () => { activePanel = 'rendered'; });
rendered.addEventListener('focusin',    () => { activePanel = 'rendered'; });
sourceTA.addEventListener('mouseenter', () => { activePanel = 'source'; });
sourceTA.addEventListener('focusin',    () => { activePanel = 'source'; });

// ── Content sync ──
sourceTA.addEventListener('input', () => {
  if (currentMode !== 'split') return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    ignoreSync = true;
    const prevRatio = rendered.scrollHeight > rendered.clientHeight
      ? rendered.scrollTop / (rendered.scrollHeight - rendered.clientHeight) : 0;
    rendered.innerHTML = renderToHtml(sourceTA.value);
    await renderMermaidBlocks(rendered);
    rendered.scrollTop = prevRatio * (rendered.scrollHeight - rendered.clientHeight);
    ignoreSync = false;
  }, 400);
});
rendered.addEventListener('input', () => {
  if (currentMode !== 'split' || ignoreSync) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { sourceTA.value = htmlToMd(); }, 600);
});

// ── Scroll sync (one-way: active panel drives the other) ──
let scrollRaf = null;
function syncScroll(source, target) {
  if (scrollRaf) return;
  scrollRaf = requestAnimationFrame(() => {
    const maxS = source.scrollHeight - source.clientHeight;
    const maxT = target.scrollHeight - target.clientHeight;
    if (maxS > 1 && maxT > 1) {
      target.scrollTop = (source.scrollTop / maxS) * maxT;
    }
    scrollRaf = null;
  });
}

rendered.addEventListener('scroll', () => {
  if (currentMode === 'split' && activePanel === 'rendered') syncScroll(rendered, sourceTA);
}, { passive: true });
sourceTA.addEventListener('scroll', () => {
  if (currentMode === 'split' && activePanel === 'source') syncScroll(sourceTA, rendered);
}, { passive: true });

/* ══════════════════════════════════════
   Format Commands
   ══════════════════════════════════════ */
function fmt(cmd) {
  if (cmd === 'code') {
    const sel = window.getSelection();
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0);
      const code = document.createElement('code');
      try { range.surroundContents(code); } catch(e) {
        document.execCommand('insertHTML', false, '<code>' + sel.toString() + '</code>');
      }
    }
    return;
  }
  document.execCommand(cmd, false, null);
}
function fmtBlock(tag) { document.execCommand('formatBlock', false, tag); }
function insertCodeBlock() {
  document.execCommand('insertHTML', false, '<pre><code>code here</code></pre><p><br></p>');
}

/* ══════════════════════════════════════
   File Handling
   ══════════════════════════════════════ */
fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) readFile(f); });
$('#uploadCard').addEventListener('click', () => fileInput.click());

function readFile(file) {
  const r = new FileReader();
  r.onload = e => loadMd(e.target.result, file.name);
  r.readAsText(file);
}

// Drag & drop
let dragC = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragC++; dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dragC--; if (dragC<=0){dragC=0;dropOverlay.classList.remove('active');} });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); dragC=0; dropOverlay.classList.remove('active'); const f=e.dataTransfer.files[0]; if(f) readFile(f); });

// Download
downloadBtn.addEventListener('click', () => {
  syncCurrentMd();
  const blob = new Blob([rawMd], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = currentFileName; a.click();
  URL.revokeObjectURL(a.href);
  showToast('✅ Downloaded ' + currentFileName);
});

function syncCurrentMd() {
  if (currentMode === 'source' || currentMode === 'split') rawMd = sourceTA.value;
  else rawMd = htmlToMd();
}

/* ══════════════════════════════════════
   Start Helpers
   ══════════════════════════════════════ */
function startEmpty(e) { e.stopPropagation(); loadMd('# Heading\n\nStart writing content...\n', 'untitled.md'); }
function startDemo(e) {
  e.stopPropagation();
  const demo = `# MD Studio Demo

## Features

- ✏️ **WYSIWYG** editing
- 🔀 Mermaid diagram rendering
- 📋 Version management & Diff comparison
- 🌙 Dark / Light theme toggle

## Flowchart Example

\`\`\`mermaid
flowchart TD
    A[📄 Upload Markdown] --> B{Select Mode}
    B --> C[Visual Editing]
    B --> D[Source Editing]
    B --> E[Split Mode]
    C --> F[Save Version]
    D --> F
    E --> F
    F --> G[Version Diff]
    G --> H[Download Export]
\`\`\`

## Sequence Diagram Example

\`\`\`mermaid
sequenceDiagram
    participant U as User
    participant E as Editor
    participant V as Version Manager
    U->>E: Edit Markdown
    E->>E: Live Render
    U->>V: Save Version

    V-->>U: Show Differences
\`\`\`

## Code Example

\`\`\`javascript

  console.log("Hello, MD Studio!");
}
\`\`\`

## Table

| Feature | Status |
|------|------|
| Markdown Rendering | ✅ |
| Mermaid Diagrams | ✅ |

> 💡 Try clicking "Save Version", then modify the content and compare to see the Diff!
`;
  loadMd(demo, 'demo.md');
}

/* ══════════════════════════════════════
   Version Management
   ══════════════════════════════════════ */
saveVerBtn.addEventListener('click', () => {
  syncCurrentMd();
  const label = 'v' + (versions.length + 1);
  versions.push({ label, md: rawMd, ts: Date.now(), fileName: currentFileName });
  saveToStorage();
  updateVersionUI();
  showToast('💾 Saved ' + label);
});

versionBtn.addEventListener('click', toggleVersionPanel);

function toggleVersionPanel() {
  versionPanel.classList.toggle('open');
  if (versionPanel.classList.contains('open')) updateVersionUI();
}

function updateVersionUI() {
  $('#verCount').textContent = versions.length ? `(${versions.length})` : '';
  if (!versions.length) {
    versionList.innerHTML = '<div class="vp-empty">No versions yet<br><br>Click "Save Version" in the toolbar<br>to save a snapshot of current content</div>';
    $('#diffBtn').disabled = true;
    return;
  }
  let html = '';
  versions.forEach((v, i) => {
    const time = new Date(v.ts).toLocaleString('en-US', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const size = (new Blob([v.md]).size / 1024).toFixed(1);
    const sel = selectedVersions.includes(i);
    html += `<div class="ver-item ${sel?'active':''}" onclick="toggleVerSelect(${i})">
      <div class="ver-label">
        ${v.label} <span class="ver-badge">${size}KB</span>
      </div>
      <div class="ver-time">${time}</div>
      <div class="ver-btns" onclick="event.stopPropagation()">
        <button class="ver-action-btn" onclick="downloadVersion(${i})" title="Download this version">⬇ Download</button>
        <button class="ver-action-btn" onclick="restoreVersion(${i})" title="Restore to this version">↩ Restore</button>
        <button class="ver-action-btn del" onclick="deleteVersion(${i})" title="Delete this version">✕</button>
      </div>
    </div>`;
  });
  versionList.innerHTML = html;
  $('#diffBtn').disabled = selectedVersions.length < 1;
}

// Download a specific version
function downloadVersion(i) {
  const v = versions[i];
  const fname = (v.fileName || 'untitled') .replace(/\.md$/, '') + '_' + v.label + '.md';
  const blob = new Blob([v.md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fname; a.click();
  URL.revokeObjectURL(a.href);
  showToast('⬇ Downloaded ' + fname);
}

// Restore editor to a specific version
function restoreVersion(i) {
  const v = versions[i];
  loadMd(v.md, v.fileName || currentFileName);
  showToast('↩ Restored to ' + v.label);
}

// Delete a version
function deleteVersion(i) {
  const v = versions[i];
  versions.splice(i, 1);
  selectedVersions = selectedVersions.filter(s => s !== i).map(s => s > i ? s-1 : s);
  saveToStorage();
  updateVersionUI();
  showToast('Deleted ' + v.label);
}

function toggleVerSelect(i) {
  const idx = selectedVersions.indexOf(i);
  if (idx >= 0) selectedVersions.splice(idx, 1);
  else { if (selectedVersions.length >= 2) selectedVersions.shift(); selectedVersions.push(i); }
  updateVersionUI();
}

/* ══════════════════════════════════════
   Diff
   ══════════════════════════════════════ */
function diffSelected() {
  syncCurrentMd();
  openDiffModal();
}

function openDiffModal() {
  // Populate selectors
  const fromSel = $('#diffFrom');
  const toSel = $('#diffTo');
  let opts = '<option value="current">📝 Current Content</option>';
  versions.forEach((v, i) => { opts += `<option value="${i}">${v.label} — ${fmtTime(v.ts)}</option>`; });
  fromSel.innerHTML = opts;
  toSel.innerHTML = opts;

  // Pre-select based on selectedVersions
  if (selectedVersions.length === 2) {
    fromSel.value = '' + Math.min(...selectedVersions);
    toSel.value = '' + Math.max(...selectedVersions);
  } else if (selectedVersions.length === 1) {
    fromSel.value = '' + selectedVersions[0];
    toSel.value = 'current';
  } else {
    fromSel.value = versions.length ? '0' : 'current';
    toSel.value = 'current';
  }
  runDiffFromSelectors();
  diffOverlay.classList.add('active');
}

function runDiffFromSelectors() {
  const fromVal = $('#diffFrom').value;
  const toVal = $('#diffTo').value;
  const fromMd = fromVal === 'current' ? rawMd : versions[+fromVal].md;
  const toMd = toVal === 'current' ? rawMd : versions[+toVal].md;
  const fromLabel = fromVal === 'current' ? 'Current' : versions[+fromVal].label;
  const toLabel = toVal === 'current' ? 'Current' : versions[+toVal].label;
  $('#diffTitle').textContent = `Diff: ${fromLabel} → ${toLabel}`;
  renderDiff(fromMd, toMd);
}

function renderDiff(oldText, newText) {
  const diff = Diff.diffLines(oldText, newText);
  let html = '';
  let oldLine = 1, newLine = 1;
  let added = 0, removed = 0;

  diff.forEach(part => {
    const lines = part.value.replace(/\n$/, '').split('\n');
    lines.forEach(line => {
      if (part.added) {
        html += `<div class="diff-line added"><span class="line-no">${newLine++}</span><span class="line-content"><span class="prefix">+</span>${escHtml(line)}</span></div>`;
        added++;
      } else if (part.removed) {
        html += `<div class="diff-line removed"><span class="line-no">${oldLine++}</span><span class="line-content"><span class="prefix">−</span>${escHtml(line)}</span></div>`;
        removed++;
      } else {
        html += `<div class="diff-line context"><span class="line-no">${newLine++}</span><span class="line-content"><span class="prefix"> </span>${escHtml(line)}</span></div>`;
        oldLine++;
      }
    });
  });

  $('#diffStats').innerHTML = `<span class="stat-add">+ ${added} lines added</span><span class="stat-del">− ${removed} lines removed</span><span>${added+removed} changes total</span>`;
  $('#diffBody').innerHTML = html;
}

function closeDiff() { diffOverlay.classList.remove('active'); }
diffOverlay.addEventListener('click', e => { if (e.target === diffOverlay) closeDiff(); });

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ts) { return new Date(ts).toLocaleString('en-US',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

/* ══════════════════════════════════════
   Persistent Storage (IndexedDB)
   ══════════════════════════════════════ */
const DB_NAME = 'md-studio';
const DB_VER = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('state')) d.createObjectStore('state');
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => { console.warn('IndexedDB error:', e); reject(e); };
  });
}

function dbPut(key, val) {
  if (!db) return;
  const tx = db.transaction('state', 'readwrite');
  tx.objectStore('state').put(val, key);
}

function dbGet(key) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    const tx = db.transaction('state', 'readonly');
    const req = tx.objectStore('state').get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror = () => resolve(null);
  });
}

function saveToStorage() {
  dbPut('versions', versions);
  dbPut('currentFileName', currentFileName);
}

// Auto-save current content periodically
let autoSaveTimer = null;
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    syncCurrentMd();
    dbPut('autosave', { md: rawMd, fileName: currentFileName, ts: Date.now() });
  }, 2000);
}
rendered.addEventListener('input', scheduleAutoSave);
sourceTA.addEventListener('input', scheduleAutoSave);

// Restore on load
async function restoreFromStorage() {
  try {
    await openDB();
    const savedVersions = await dbGet('versions');
    if (savedVersions && savedVersions.length) {
      versions = savedVersions;
    }
    const autosave = await dbGet('autosave');
    if (autosave && autosave.md) {
      await loadMd(autosave.md, autosave.fileName || 'untitled.md');
      showToast('📂 Restored previous editing content');
    }
  } catch(e) { console.warn('Restore failed:', e); }
}
restoreFromStorage();

/* ══════════════════════════════════════
   Toast & Shortcuts
   ══════════════════════════════════════ */
function showToast(msg) { const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); downloadBtn.click(); }
  if (e.key==='Escape') { closeDiff(); if(versionPanel.classList.contains('open')) toggleVersionPanel(); }
});

/* ══════════════════════════════════════
   Split Divider Drag
   ══════════════════════════════════════ */
let dragging = false;
splitDiv.addEventListener('mousedown', e => { dragging=true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = editorWrap.getBoundingClientRect();
  const pct = ((e.clientX-rect.left)/rect.width)*100;
  rendered.style.flexBasis = Math.max(20,Math.min(80,pct))+'%';
  rendered.style.flexGrow = '0'; rendered.style.flexShrink = '0';
});
document.addEventListener('mouseup', () => { dragging=false; });
</script>
</body>
</html>
